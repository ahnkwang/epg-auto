name: Final Korea EPG Deploy

on:
  schedule:
    - cron: '23 20 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Pure Korea EPG
        run: |
          mkdir -p public
          # 가장 안정적인 원본 EPG 압축파일을 다운받아 그 자리에서 압축을 풀어 정상적인 XML을 만듭니다.
          wget -qO- https://github.com/epgshare01/share01/raw/master/epg_ripper_KR1.xml.gz | gunzip -c > public/epg_ripper_KR1.xml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
