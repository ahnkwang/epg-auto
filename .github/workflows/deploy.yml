name: Auto Download and Deploy

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Extract EPG
        run: |
          mkdir -p public
          # 사라진 원래 주소 대신, 현재 실시간으로 배포 중인 살아있는 원본 압축파일 주소로 대체합니다.
          wget https://github.com/epgshare01/share01/raw/main/epg_ripper_KR1.xml.gz
          gunzip epg_ripper_KR1.xml.gz
          mv epg_ripper_KR1.xml public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
