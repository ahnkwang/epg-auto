name: Final Korea EPG Deploy

on:
  schedule:
    - cron: '23 20 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Pure Korea EPG
        run: |
          mkdir -p public
          # 가장 안정적인 고품질 XML 배포처로 주소 고정
          curl -sL "https://raw.githubusercontent.com/epgkr/epgkr-script/master/epg.xml" > public/epg_ripper_KR1.xml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
