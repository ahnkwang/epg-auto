name: Auto Download and Deploy

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Extract EPG
        run: |
          mkdir -p public
          # epgshare01 원본 압축파일 다운로드 및 압축 해제
          wget https://raw.githubusercontent.com/epgshare01/share01/master/epg_ripper_KR1.xml.gz
          gunzip epg_ripper_KR1.xml.gz
          mv epg_ripper_KR1.xml public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
