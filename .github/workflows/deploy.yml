name: Final Korea EPG Deploy

on:
  schedule:
    - cron: '23 20 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Pure Korea EPG
        run: |
          mkdir -p public
          # 검증된 국내 포털 기반 데이터를 가져옵니다.
          curl -sL -o public/epg_ripper_KR1.xml https://raw.githubusercontent.com/wkdgn/soju/main/k_epg.xml || wget -O public/epg_ripper_KR1.xml https://raw.githubusercontent.com/wkdgn/soju/main/k_epg.xml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
