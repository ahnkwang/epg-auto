name: Auto Download and Deploy Korea EPG

on:
  schedule:
    - cron: '23 20 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prevent Cron Suspension
        run: |
          date > keepalive_log.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keepalive_log.txt
          git commit -m "Auto Keepalive Update" || echo "No changes"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Korea EPG Generator
        run: |
          mkdir -p public
          # 국내 포털 및 IPTV 파싱 최적화 엔진 다운로드 및 실행
          wget -O epg.py https://raw.githubusercontent.com/wkdgn/soju/main/soju.py || wget -O epg.py https://raw.githubusercontent.com/epgkr/epgkr-script/main/epgkr.py
          python epg.py
          # 생성된 결과물 파일명을 기존 파일명과 일치시켜 자동 교체되도록 처리
          if [ -f k_epg.xml ]; then cp k_epg.xml public/epg_ripper_KR1.xml; fi
          if [ -f epg.xml ]; then cp epg.xml public/epg_ripper_KR1.xml; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
